name: Feature request
description: Suggest an idea or improvement
labels: [ enhancement ]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that the plugin doesn't support today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like it to work? DSL/tasks you'd expect.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
